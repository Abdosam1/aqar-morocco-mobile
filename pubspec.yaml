name: aqar_morocco_mobile
description: A comprehensive real estate mobile application for the Moroccan market.
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  provider: ^6.1.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
